<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connect 4 - AI Difficulty</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}?v=2.0">
</head>
<body>

    <div style="text-align: center; margin-top: 40px;">
        <h1 style="font-size: 32px; margin-bottom: 5px;">Choose the difficulty</h1>
        <p style="color: #7f8c8d; font-size: 16px;">Set the lookahead tree search depth limit</p>
        
        <br><br>

        <form action="/choose_difficulty" method="POST" style="display: flex; flex-direction: column; align-items: center;">
            
            <div style="margin-bottom: 15px;">
                <button type="submit" name="difficulty_level" value="easy" 
                        style="padding: 15px; font-size: 16px; width: 260px; font-weight: bold; background-color: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    Easy 
                </button>
            </div>

            <div style="margin-bottom: 15px;">
                <button type="submit" name="difficulty_level" value="medium" 
                        style="padding: 15px; font-size: 16px; width: 260px; font-weight: bold; background-color: #f1c40f; color: black; border: none; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    Medium
                </button>
            </div>

            <div>
                <button type="submit" name="difficulty_level" value="hard" 
                        style="padding: 15px; font-size: 16px; width: 260px; font-weight: bold; background-color: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    Hard
                </button>
            </div>

        </form>

        <br><br><br>
        <a href="/reset" style="text-decoration: none;">
            <button class="action-btn" style="background-color: #7f8c8d;">Go Back Home</button>
        </a>
    </div>

</body>
</html>
